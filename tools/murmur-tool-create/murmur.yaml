name: murmur-tool-create
version: 0.1.0
runtime: tool
implementation: wasm
artifact_type: scaffold
description: Scaffolds a new tool artifact directory with murmur.yaml, stub implementation, and README.md.
input_schema: |
  {"type":"object","properties":{"type":{"type":"string","enum":["tool"],"description":"Scaffold type (currently only 'tool')"},"name":{"type":"string","description":"Tool name (becomes the directory name under tools/)"},"runtime":{"type":"string","enum":["native","wasm"],"default":"native","description":"Target runtime for the new tool"}},"required":["type","name"]}
output_schema: |
  {"type":"object","properties":{"path":{"type":"string","description":"Relative path to the created tool directory"}}}
requires_files:
  - murmur_tool_create.wasm
