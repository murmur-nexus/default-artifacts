name: murmur-tool-request-input
version: 0.1.0
runtime: tool
implementation: wasm
description: |
  Pauses the agent loop and requests external input via A2A. The caller supplies
  a prompt; the runtime transitions the task to input-required state and blocks until
  a follow-up message/send delivers an answer. The answer is returned as the tool result.

input_schema:
  type: object
  properties:
    prompt:
      type: string
      description: "The question or prompt to present to the human. Displayed in the input-required task state."
  required:
    - prompt
