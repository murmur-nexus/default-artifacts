# Single source of truth for all publishable artifact names, paths, and versions.
#
# Bump workflow: edit versions here → run ./scripts/apply-versions.sh → commit → push tag.
#
# workspace_version drives [workspace.package] version in the root Cargo.toml.
# All crates inherit it via `version.workspace = true`.
#
# Each [[artifact]] version drives that artifact's murmur.yaml and, for native
# tools that have a package.sh, the VERSION= variable inside it.
# An artifact's version may differ from workspace_version when needed.
#
# Only publishable artifacts (those with a murmur.yaml) are listed here.
# Internal-only crates (e.g. murmur-tool-git-validate) must not appear.

workspace_version = "0.1.0"

